<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolyWeather — Smart Exits</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --card-border: #1e1e2e;
    --green: #00e676;
    --red: #ff5252;
    --amber: #ffc107;
    --cyan: #4fc3f7;
    --text: #e0e0e0;
    --text2: #888;
    --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* ── Sidebar ─────────────────────────────────── */
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: 200px;
    background: #0d0d14; border-right: 1px solid var(--card-border);
    display: flex; flex-direction: column; padding: 20px 0; z-index: 100;
  }
  .sidebar-logo {
    display: flex; align-items: center; gap: 8px; padding: 0 16px 20px;
    font-size: 16px; font-weight: 700; text-decoration: none; color: var(--text);
  }
  .sidebar-logo .logo-icon {
    font-size: 20px;
    filter: drop-shadow(0 0 6px rgba(79, 195, 247, 0.5));
  }
  .sidebar-logo span:not(.logo-icon) {
    background: linear-gradient(135deg, var(--cyan), var(--green));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .strategy-switcher {
    display: flex; margin: 0 12px 16px; border-radius: 6px; overflow: hidden;
    border: 1px solid var(--card-border); background: var(--bg);
  }
  .strategy-switcher a {
    flex: 1; padding: 6px 4px; text-align: center; font-size: 11px; font-weight: 600;
    color: var(--text2); text-decoration: none; transition: all 0.2s;
    font-family: var(--sans); cursor: pointer;
  }
  .strategy-switcher a:hover { color: var(--text); }
  .strategy-switcher a.active {
    background: rgba(79,195,247,0.15); color: var(--cyan);
  }
  .sidebar-nav { display: flex; flex-direction: column; gap: 4px; }
  .sidebar-nav-subtitle {
    padding: 2px 16px 4px 20px; font-size: 11px; color: var(--text2); opacity: 0.6;
    margin-top: 4px; margin-bottom: 6px; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sidebar-link {
    display: flex; align-items: center; gap: 10px; padding: 10px 16px;
    color: var(--text2); font-size: 13px; font-weight: 500; text-decoration: none;
    border-left: 3px solid transparent; transition: all 0.2s;
  }
  .sidebar-link:hover { color: var(--text); background: rgba(79,195,247,0.05); }
  .sidebar-link.active {
    color: var(--cyan); border-left-color: var(--cyan);
    background: rgba(79,195,247,0.08);
  }
  .sidebar-signout {
    margin-top: auto; padding: 0 16px 16px;
    border-top: 1px solid var(--card-border); padding-top: 16px;
  }
  .main-content { margin-left: 200px; min-height: 100vh; }
  .top-bar {
    display: flex; justify-content: flex-start; align-items: center;
    padding: 10px 24px; border-bottom: 1px solid var(--card-border);
  }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main-content { margin-left: 0; padding-bottom: 70px; }
  }
  .mobile-nav {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--card);
    border-top: 1px solid var(--card-border);
    z-index: 500;
    padding: 6px 0 env(safe-area-inset-bottom, 6px);
  }
  .mobile-nav-inner {
    display: flex;
    justify-content: space-around;
    align-items: center;
  }
  .mobile-nav a, .mobile-nav button {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    background: none;
    border: none;
    color: var(--text2);
    font-size: 10px;
    font-family: var(--sans);
    cursor: pointer;
    padding: 6px 8px;
    text-decoration: none;
    transition: color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .mobile-nav a:hover, .mobile-nav button:hover { color: var(--text); }
  .mobile-nav .active { color: var(--cyan); }
  .mobile-nav .nav-icon { font-size: 18px; }
  @media (max-width: 768px) {
    .mobile-nav { display: block; }
  }

  /* ── Layout ─────────────────────────────────── */
  .container {
    max-width: 100%;
    margin: 0 auto;
    padding: 24px;
  }

  .section-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .icon { font-size: 18px; }
  .section { margin-bottom: 32px; }

  /* ── Summary Cards ─────────────────────────── */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }

  .stat-card .label {
    font-size: 11px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .stat-card .value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
  }

  .stat-card .sub {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
    margin-top: 4px;
  }

  /* ── Tables ─────────────────────────────────── */
  .table-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 32px;
  }

  .table-card .table-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--card-border);
  }

  .table-card .table-header h3 {
    font-size: 14px;
    font-weight: 600;
  }

  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    text-align: left;
    padding: 10px 14px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text2);
    border-bottom: 1px solid var(--card-border);
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    font-family: var(--sans);
  }

  th:hover { color: var(--cyan); }
  th .sort-arrow { font-size: 10px; margin-left: 4px; }

  td {
    padding: 9px 14px;
    border-bottom: 1px solid rgba(30, 30, 46, 0.5);
    font-family: var(--mono);
    font-size: 12px;
    white-space: nowrap;
  }

  tr:hover { background: rgba(79, 195, 247, 0.03); }

  /* ── Badges ─────────────────────────────────── */
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    font-family: var(--sans);
  }
  .badge-hold { background: rgba(0, 230, 118, 0.15); color: var(--green); }
  .badge-take-profit { background: rgba(0, 200, 83, 0.2); color: #69f0ae; }
  .badge-consider { background: rgba(255, 193, 7, 0.15); color: var(--amber); }
  .badge-danger { background: rgba(255, 152, 0, 0.2); color: #ffab40; }
  .badge-exit { background: rgba(255, 82, 82, 0.15); color: var(--red); }
  .badge-stop { background: rgba(255, 82, 82, 0.25); color: var(--red); border: 1px solid rgba(255, 82, 82, 0.3); }

  .forecast-change-up { color: var(--green); font-weight: 600; }
  .forecast-change-down { color: var(--red); font-weight: 600; }
  .forecast-change-flat { color: var(--text2); }

  .info-box {
    background: rgba(79, 195, 247, 0.06);
    border: 1px solid rgba(79, 195, 247, 0.15);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 24px;
    font-size: 12px;
    color: var(--text2);
    line-height: 1.6;
  }
  .info-box strong { color: var(--text); }

  .val-pos { color: var(--green); }
  .val-neg { color: var(--red); }
  .val-neutral { color: var(--text2); }

  /* ── Loading ───────────────────────────────── */
  .loading {
    text-align: center;
    padding: 60px 24px;
    color: var(--text2);
    font-size: 14px;
  }

  .loading .spinner {
    display: inline-block;
    width: 24px; height: 24px;
    border: 2px solid var(--card-border);
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Value Score Bar ───────────────────────── */
  .score-bar {
    display: inline-block;
    width: 60px;
    height: 6px;
    background: var(--card-border);
    border-radius: 3px;
    overflow: hidden;
    vertical-align: middle;
    margin-right: 6px;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
  }

  /* ── Opportunities ─────────────────────────── */
  .opp-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }
  .opp-card:hover { border-color: rgba(79, 195, 247, 0.3); }
  .opp-info { flex: 1; }
  .opp-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .opp-detail { font-size: 11px; color: var(--text2); font-family: var(--mono); }
  .opp-edge { font-family: var(--mono); font-size: 14px; font-weight: 600; }

  /* ── History Summary Cards ────────────────── */
  .history-summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .history-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 16px;
  }
  .history-card .hc-title {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 10px;
    color: var(--text);
    font-family: var(--sans);
  }
  .history-card .hc-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 4px;
    font-family: var(--mono);
  }
  .history-card .hc-row .hc-label { color: var(--text2); }
  .history-card .hc-row .hc-val { color: var(--text); font-weight: 500; }
  .history-card .hc-winrate {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--card-border);
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    font-family: var(--mono);
  }

  /* ── History sort ─────────────────────────── */
  .hist-th { cursor: pointer; user-select: none; }
  .hist-th:hover { color: var(--cyan); }
</style>
</head>

<!-- ── Main Content ────────────────────────────── -->
<div class="main-content">
<div class="top-bar" style="position:relative;">
  <div style="display:flex;align-items:center;gap:10px;">
    <span id="portfolio-name-display" style="font-size:22px;font-weight:700;color:var(--text);">Loading...</span>
    <button onclick="document.getElementById('portfolio-picker').style.display=document.getElementById('portfolio-picker').style.display==='none'?'block':'none'" style="background:none;border:1px solid var(--card-border);color:var(--cyan);padding:4px 12px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;font-family:var(--sans);">Change Portfolio</button>
    <button onclick="loadData()" style="background:none;border:1px solid var(--card-border);color:var(--green);padding:4px 12px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;font-family:var(--sans);">Refresh Prices</button>

  </div>
  <select id="portfolio-select" onchange="onPortfolioChange()" style="display:none;"><option value="" disabled selected>Select a portfolio...</option></select>
</div>

  <div style="display:flex;border-bottom:1px solid var(--card-border);padding:4px 8px;">
    <a href="/" style="flex:1;text-align:center;font-size:10px;font-weight:600;color:var(--cyan);padding:4px;text-decoration:none;font-family:var(--sans);">Temp Predictions</a>
    <a href="/sniper" style="flex:1;text-align:center;font-size:10px;font-weight:600;color:var(--text2);padding:4px;text-decoration:none;font-family:var(--sans);">Sniper</a>
  </div>
  <div class="mobile-nav-inner">
    <a href="/"><span class="nav-icon">&#x1F4CA;</span>Home</a>
    <a href="/exits.html" class="active nav-smart-exits"><span class="nav-icon">&#x1F6AA;</span>Exits</a>

    <a href="/" onclick="localStorage.setItem('pw-tab','settings')"><span class="nav-icon">&#x2699;</span>Settings</a>
  </div>
</nav>

<script>
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

const fmt = (n, d=2) => n == null ? '\u2014' : Number(n).toFixed(d);
const fmtUsd = n => n == null ? '\u2014' : '$' + Number(n).toFixed(2);
const fmtPct = n => n == null ? '\u2014' : Number(n).toFixed(1) + '%';
const fmtEdge = n => n == null ? '\u2014' : Number(n).toFixed(1) + 'pp';
const F_CITIES = new Set(['Chicago','San Francisco','Miami','NYC','Austin','Denver','Houston','Los Angeles','Seattle','Toronto','Atlanta','Dallas','New York City']);
const band = t => F_CITIES.has(t.city||'') ? (t.band_f||t.band_c||'') : (t.band_c||t.band_f||'');

let allPortfolios = [];
let currentPortfolioId = '';
let currentPortfolio = null;
let positionsData = [];
let forecastComparisons = {};  // keyed by trade id
let sortCol = null;
let sortAsc = true;
let historySortCol = null;
let historySortAsc = true;
let historySnapshots = [];
let historySummary = null;

// ── Portfolio Loading ──
async function loadPortfolios() {
  try {
    const res = await fetch('/api/portfolios');
    const data = await res.json();
    allPortfolios = data.portfolios || data || [];
    const sel = $('#portfolio-select');
    sel.innerHTML = '<option value="" disabled>Select a portfolio...</option>';

    // Filter to live portfolios only
    const livePortfolios = allPortfolios.filter(p => p.trade_mode === 'live');

    if (livePortfolios.length === 0) {
      // Fall back to all portfolios if no live ones
      allPortfolios.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.name;
        sel.appendChild(opt);
      });
    } else {
      livePortfolios.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.name;
        sel.appendChild(opt);
      });
    }

    const available = livePortfolios.length > 0 ? livePortfolios : allPortfolios;
    if (available.length > 0) {
      const saved = localStorage.getItem('pw-portfolio-id');
      const startId = (saved && available.some(p => p.id === saved)) ? saved : available[0].id;
      sel.value = startId;
      onPortfolioChange();
    } else {
      $('#app').innerHTML = '<div class="loading">No portfolios found</div>';
      $('#portfolio-name-display').textContent = 'No portfolios';
    }
  } catch (e) {
    console.error('Failed to load portfolios:', e);
    $('#app').innerHTML = '<div class="loading">Failed to load portfolios</div>';
  }
}

function updatePortfolioDisplay() {
  const sel = $('#portfolio-select');
  const nameEl = $('#portfolio-name-display');
  const selected = sel.options[sel.selectedIndex];
  if (nameEl) nameEl.textContent = selected ? selected.textContent : 'Select portfolio';

  const available = allPortfolios.filter(p => p.trade_mode === 'live');
  const list = (available.length > 0 ? available : allPortfolios);

  const pickerList = $('#portfolio-picker-list');
  if (pickerList) {
    pickerList.innerHTML = list.map(p =>
      `<div style="padding:8px 12px;cursor:pointer;border-radius:6px;font-size:13px;color:${p.id === currentPortfolioId ? 'var(--cyan)' : 'var(--text)'};font-weight:${p.id === currentPortfolioId ? '600' : '400'};"
        onmouseover="this.style.background='rgba(79,195,247,0.08)'"
        onmouseout="this.style.background=''"
        onclick="$('#portfolio-select').value='${p.id}';$('#portfolio-picker').style.display='none';onPortfolioChange();">${p.name || p.id}${p.trade_mode === 'live' && p.active === false ? ' <span style=&quot;color:var(--red);font-size:10px;font-weight:700;&quot;>PAUSED</span>' : p.trade_mode === 'live' ? ' <span style=&quot;color:var(--green);font-size:10px;&quot;>LIVE</span>' : ''}</div>`
    ).join('');
  }
}

function onPortfolioChange() {
  const sel = $('#portfolio-select');
  currentPortfolioId = sel.value;
  localStorage.setItem('pw-portfolio-id', currentPortfolioId);
  currentPortfolio = allPortfolios.find(p => p.id === currentPortfolioId) || null;
  const nameEl = document.getElementById('sidebar-portfolio-name');
  if (nameEl) nameEl.textContent = currentPortfolio ? currentPortfolio.name : 'All Portfolios';
  // Show/hide Smart Exits nav based on trade mode
  const isLivePortfolio = currentPortfolio && currentPortfolio.trade_mode === 'live';
  document.querySelectorAll('.nav-smart-exits').forEach(el => {
    el.style.display = isLivePortfolio ? '' : 'none';
  });
  updatePortfolioDisplay();
  if (!currentPortfolioId) {
    $('#app').innerHTML = '<div class="loading">Select a portfolio to view positions</div>';
    return;
  }
  $('#app').innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading positions...</div></div>';
  loadData();
}

// ── Data Loading ──
async function loadData() {
  try {
    const [pricesRes, compareRes, histSummaryRes, histSnapsRes] = await Promise.all([
      fetch(`/api/refresh_prices?portfolio_id=${currentPortfolioId}`),
      fetch(`/api/forecast_compare?portfolio_id=${currentPortfolioId}`),
      fetch(`/api/exit_snapshots?summary=true&portfolio_id=${currentPortfolioId}`),
      fetch(`/api/exit_snapshots?portfolio_id=${currentPortfolioId}`)
    ]);
    const pricesData = await pricesRes.json();
    const compareData = await compareRes.json();
    try {
      historySummary = await histSummaryRes.json();
      historySnapshots = await histSnapsRes.json();
      if (!Array.isArray(historySnapshots)) historySnapshots = [];
    } catch (e) {
      historySummary = null;
      historySnapshots = [];
    }

    positionsData = pricesData.trades || [];

    // Fetch wallet balance for live portfolios
    let walletBalanceData = null;
    if (currentPortfolio && currentPortfolio.trade_mode === 'live') {
      try {
        const capRes = await fetch('/api/trades?capital=true&portfolio_id=' + currentPortfolioId + '&limit=1');
        const capData = await capRes.json();
        if (capData && capData.capital && capData.capital.wallet_balance) {
          walletBalanceData = capData.capital.wallet_balance;
        }
      } catch (e) {}
    }

    // Index forecast comparisons by trade id
    forecastComparisons = {};
    for (const c of (compareData.comparisons || [])) {
      if (c.trade && c.trade.id) {
        forecastComparisons[c.trade.id] = c;
      }
    }

    // Fetch latest scanner opportunities, filtered by portfolio strategy
    let opportunities = [];
    try {
      // Get portfolio strategy for filtering
      const pfRes = await fetch('/api/portfolios?id=' + currentPortfolioId);
      const pfData = await pfRes.json();
      const strategy = pfData.strategy || {};
      const allowedSides = strategy.allowed_sides || [];
      const allowedBetTypes = strategy.allowed_bet_types || [];
      const blockedCities = strategy.blocked_cities || [];
      const allowedCities = strategy.allowed_cities || [];

      // Fetch recent opportunities from scanner
      const scanRes = await fetch('/api/trades?limit=200&status=open&portfolio_id=' + currentPortfolioId);
      const scanData = await scanRes.json();
      const existingKeys = new Set((scanData.trades || scanData || []).map(t =>
        (t.city || '') + '|' + (t.date || '') + '|' + (t.band_c || '') + '|' + (t.side || '')));

      // Fetch from a different portfolio (datagrab) which has all opportunities
      const dgRes = await fetch('/api/trades?limit=200&status=open&portfolio_id=e8e35085-43a6-4031-8159-32083dbedcbe');
      const dgData = await dgRes.json();
      const allOpps = dgData.trades || dgData || [];

      opportunities = allOpps.filter(opp => {
        // Apply portfolio strategy filters
        if (allowedSides.length && !allowedSides.includes(opp.side)) return false;
        if (allowedBetTypes.length && !allowedBetTypes.includes(opp.bet_type)) return false;
        if (blockedCities.length && blockedCities.includes(opp.city)) return false;
        if (allowedCities.length && !allowedCities.includes(opp.city)) return false;
        return true;
      })
      .map(opp => {
        const key = (opp.city||'') + '|' + (opp.date||'') + '|' + (opp.band_c||'') + '|' + (opp.side||'');
        opp._isDuplicate = existingKeys.has(key);
        return opp;
      })
      .sort((a, b) => {
        // Non-duplicates first, then by edge
        if (a._isDuplicate !== b._isDuplicate) return a._isDuplicate ? 1 : -1;
        return (parseFloat(b.edge) || 0) - (parseFloat(a.edge) || 0);
      })
      .slice(0, 15);
    } catch (e) {
      console.log('Could not fetch opportunities:', e);
    }

    render(positionsData, opportunities, walletBalanceData);
  } catch (e) {
    console.error('Failed to load data:', e);
    $('#app').innerHTML = '<div class="loading">Failed to load position data. Check console.</div>';
  }
}

// ── Exit Logic ──
function getHoursToResolution(tradeDate) {
  if (!tradeDate) return 0;
  // Market date is the date field — resolution happens at end of that date (midnight UTC next day)
  const marketClose = new Date(tradeDate + 'T23:59:59Z');
  const now = new Date();
  const diffMs = marketClose - now;
  return Math.max(0, diffMs / (1000 * 60 * 60));
}

function getUtilization() {
  if (!currentPortfolio) return 0;
  const capital = parseFloat(currentPortfolio.starting_capital_usd || 0);
  if (capital <= 0 || currentPortfolio.unlimited_capital) return 0;
  const deployed = positionsData.reduce((sum, t) => sum + parseFloat(t.total_cost_usd || 0), 0);
  return (deployed / capital) * 100;
}

function getRecommendation(trade) {
  const pnlPct = parseFloat(trade.unrealized_pnl_pct || 0);
  const comp = forecastComparisons[trade.id];

  // Use forecast-compare recommendation if available
  if (comp && comp.recommendation) {
    const rec = comp.recommendation;
    if (rec === 'exit_forecast_changed') {
      if (pnlPct < -5) return { label: 'Stop Loss', cls: 'badge-stop' };
      return { label: 'Exit \u2014 Thesis Broken', cls: 'badge-exit' };
    }
    if (rec === 'danger') return { label: 'Danger \u2014 Close to Band', cls: 'badge-danger' };
    if (rec === 'take_profit') return { label: 'Take Profit', cls: 'badge-take-profit' };
    if (rec === 'consider_exit') return { label: 'Consider Exit', cls: 'badge-consider' };
  }

  // Fallback — no forecast data
  if (pnlPct < -5) return { label: 'Stop Loss', cls: 'badge-stop' };
  return { label: 'Hold', cls: 'badge-hold' };
}

function getValueScore(trade) {
  // Higher score when: high unrealized profit + long time to resolution + portfolio near utilization limit
  const pnlPct = Math.max(0, parseFloat(trade.unrealized_pnl_pct || 0));
  const hoursLeft = getHoursToResolution(trade.date);
  const utilization = getUtilization();

  // Normalize components (0-1)
  const profitScore = Math.min(pnlPct / 10, 1);          // 10%+ = max
  const timeScore = Math.min(hoursLeft / 168, 1);         // 1 week = max
  const utilizationScore = Math.min(utilization / 100, 1); // 100% = max

  // Weighted combination
  return (profitScore * 0.4 + timeScore * 0.3 + utilizationScore * 0.3) * 100;
}

// ── Sorting ──
function sortPositions(positions, col, asc) {
  const sorters = {
    city: (a, b) => (a.city || '').localeCompare(b.city || ''),
    date: (a, b) => (a.date || '').localeCompare(b.date || ''),
    band: (a, b) => (a.band_c || a.band_f || '').localeCompare(b.band_c || b.band_f || ''),
    gap: (a, b) => {
      const ca = forecastComparisons[a.id], cb = forecastComparisons[b.id];
      const ga = ca && ca.forecast_gap != null ? ca.forecast_gap : 999;
      const gb = cb && cb.forecast_gap != null ? cb.forecast_gap : 999;
      return ga - gb;
    },
    side: (a, b) => (a.side || '').localeCompare(b.side || ''),
    type: (a, b) => (a.bet_type || '').localeCompare(b.bet_type || ''),
    entry: (a, b) => (parseFloat(a.entry_price || 0)) - (parseFloat(b.entry_price || 0)),
    current: (a, b) => (parseFloat(a.live_price || 0)) - (parseFloat(b.live_price || 0)),
    pnl: (a, b) => (parseFloat(a.unrealized_pnl || 0)) - (parseFloat(b.unrealized_pnl || 0)),
    pnl_pct: (a, b) => (parseFloat(a.unrealized_pnl_pct || 0)) - (parseFloat(b.unrealized_pnl_pct || 0)),
    hours: (a, b) => getHoursToResolution(a.date) - getHoursToResolution(b.date),
    score: (a, b) => getValueScore(a) - getValueScore(b),
    orig_edge: (a, b) => parseFloat(a.edge || 0) - parseFloat(b.edge || 0),
    curr_edge: (a, b) => {
      const ca = forecastComparisons[a.id], cb = forecastComparisons[b.id];
      const lpA = parseFloat(a.live_price || 0), lpB = parseFloat(b.live_price || 0);
      const myPa = ca && ca.latest_scan && ca.latest_scan.my_p != null ? parseFloat(ca.latest_scan.my_p) : null;
      const myPb = cb && cb.latest_scan && cb.latest_scan.my_p != null ? parseFloat(cb.latest_scan.my_p) : null;
      const ea = myPa != null && lpA > 0 ? myPa - lpA : (ca && ca.latest_scan ? parseFloat(ca.latest_scan.edge || 0) : parseFloat(a.edge || 0));
      const eb = myPb != null && lpB > 0 ? myPb - lpB : (cb && cb.latest_scan ? parseFloat(cb.latest_scan.edge || 0) : parseFloat(b.edge || 0));
      return ea - eb;
    },
    rec: (a, b) => {
      const order = { 'Exit \u2014 Thesis Broken': 0, 'Stop Loss': 1, 'Danger \u2014 Close to Band': 2, 'Consider Exit': 3, 'Take Profit': 4, 'Hold': 5 };
      return (order[getRecommendation(a).label] ?? 3) - (order[getRecommendation(b).label] ?? 3);
    }
  };

  const fn = sorters[col];
  if (!fn) return positions;
  const sorted = [...positions].sort(fn);
  return asc ? sorted : sorted.reverse();
}

function onSort(col) {
  if (sortCol === col) {
    sortAsc = !sortAsc;
  } else {
    sortCol = col;
    sortAsc = true;
  }
  render(positionsData, lastOpportunities);
}

function sortArrow(col) {
  if (sortCol !== col) return '';
  return `<span class="sort-arrow">${sortAsc ? '\u25B2' : '\u25BC'}</span>`;
}

// ── Render ──
let lastOpportunities = [];

function render(positions, opportunities, walletBalance) {

  const sorted = sortCol ? sortPositions(positions, sortCol, sortAsc) : positions;

  const totalDeployed = positions.reduce((s, t) => s + parseFloat(t.total_cost_usd || 0), 0);
  // Calculate unrealized P&L from live prices, not stale cache
  const totalUnrealizedPnl = positions.reduce((s, t) => {
    const sh = parseFloat(t.total_shares || 0);
    const co = parseFloat(t.total_cost_usd || 0);
    const lp = parseFloat(t.live_price || 0);
    return s + (sh * (lp / 100) - co);
  }, 0);
  const utilization = getUtilization();
  const exitCandidates = positions.filter(t => {

    return rec.label !== 'Hold';
  }).length;

  let html = '';

  // ── Info Box ──
  html += `<div class="info-box">
    <strong>How recommendations work:</strong> Each position is evaluated by how far the latest weather forecast is from the temperature band threshold.
    <br><br>
    <strong style="color:var(--green);">Safe (&gt;3\u00B0C gap):</strong> Forecast is well away from the band \u2014 low risk of losing.
    <strong style="color:var(--amber);">Watch (1-3\u00B0C gap):</strong> Forecast is moderately close \u2014 monitor for changes.
    <strong style="color:var(--red);">Danger (&lt;1\u00B0C gap):</strong> Forecast is very close to the band \u2014 high risk.
    <br><br>

  // ── Summary Cards ──
  html += `<div class="summary-grid">
    <div class="stat-card">
      <div class="label">Open Positions</div>
      <div class="value">${positions.length}</div>
    </div>
    <div class="stat-card">
      <div class="label">Capital Deployed</div>
      <div class="value">${fmtUsd(totalDeployed)}</div>
      ${currentPortfolio && currentPortfolio.starting_capital_usd ? `<div class="sub">${fmtPct(utilization)} utilized</div>` : ''}
    </div>
    <div class="stat-card">
      <div class="label">Unrealized P&L</div>
      <div class="value ${totalUnrealizedPnl >= 0 ? 'val-pos' : 'val-neg'}">${totalUnrealizedPnl >= 0 ? '+' : ''}${fmtUsd(totalUnrealizedPnl)}</div>
    </div>
    <div class="stat-card">
      <div class="label">Exit Candidates</div>
      <div class="value" style="color:${exitCandidates > 0 ? 'var(--amber)' : 'var(--green)'}">${exitCandidates}</div>
      <div class="sub">${exitCandidates > 0 ? 'action recommended' : 'all clear'}</div>
    </div>
    ${walletBalance ? `
    <div class="stat-card">
      <div class="label">Wallet USDC.e</div>
      <div class="value" style="color:var(--cyan);">${fmtUsd(walletBalance.usdc_e)}</div>
    </div>
    <div class="stat-card">
      <div class="label">POL (gas)</div>
      <div class="value" style="color:${walletBalance.pol < 1 ? 'var(--red)' : 'var(--text)'};">${walletBalance.pol.toFixed(2)}</div>
      ${walletBalance.pol < 1 ? '<div class="sub" style="color:var(--red);">top up soon</div>' : ''}
    </div>` : ''}
  </div>`;

  // ── Positions Table ──
  html += `<div class="table-card">
    <div class="table-header"><h3>Open Positions</h3></div>
    <div class="table-wrap">
    <table>
      <thead><tr>
        <th onclick="onSort('rec')">Rec${sortArrow('rec')}</th>
        <th onclick="onSort('city')">City${sortArrow('city')}</th>
        <th onclick="onSort('date')">Date${sortArrow('date')}</th>
        <th onclick="onSort('band')">Band${sortArrow('band')}</th>
        <th onclick="onSort('gap')">Gap${sortArrow('gap')}</th>
        <th onclick="onSort('side')">Side${sortArrow('side')}</th>
        <th>Type</th>
        <th onclick="onSort('cost')">Cost${sortArrow('cost')}</th>
        <th onclick="onSort('entry')">Entry${sortArrow('entry')}</th>
        <th onclick="onSort('current')">Current${sortArrow('current')}</th>
        <th onclick="onSort('pnl_pct')">P&L (%)${sortArrow('pnl_pct')}</th>
        <th>Profit</th>
        <th>Left</th>
        <th>Captured</th>
        <th>Orig Forecast</th>
        <th>Latest Forecast</th>
        <th onclick="onSort('orig_edge')">Orig Edge${sortArrow('orig_edge')}</th>
        <th onclick="onSort('curr_edge')">Curr Edge${sortArrow('curr_edge')}</th>
        <th>Change</th>
        <th onclick="onSort('hours')">Hours Left${sortArrow('hours')}</th>
        <th>Link</th>
      </tr></thead>
      <tbody>`;

  if (sorted.length === 0) {
    html += `<tr><td colspan="19" style="text-align:center;color:var(--text2);padding:40px;">No open positions</td></tr>`;
  } else {
    for (const t of sorted) {
      const rec = getRecommendation(t);
      // Calculate P&L % from live price, not stale cache
      const _shares = parseFloat(t.total_shares || 0);
      const _cost = parseFloat(t.total_cost_usd || 0);
      const _liveVal = _shares * (parseFloat(t.live_price || 0) / 100);
      const pnlPct = _cost > 0 ? ((_liveVal - _cost) / _cost * 100) : 0;
      const hoursLeft = getHoursToResolution(t.date);
      const entryPrice = parseFloat(t.entry_price || 0) * 100;
      const livePrice = parseFloat(t.live_price || 0);

      // Forecast comparison data
      const comp = forecastComparisons[t.id];
      const origForecast = t.forecast_c != null ? fmt(t.forecast_c, 1) + '\u00B0C' : '\u2014';
      const origEdge = t.edge != null ? fmtEdge(parseFloat(t.edge)) : '\u2014';

      let latestForecast = '\u2014';
      let currEdge = '\u2014';
      let changeIcon = '<span class="forecast-change-flat">\u2014</span>';

      if (comp && comp.latest_scan) {
        const ls = comp.latest_scan;
        latestForecast = ls.forecast_c != null ? fmt(ls.forecast_c, 1) + '\u00B0C' : '\u2014';
        // Calculate real current edge from latest my_p minus current live price
        const latestMyP = ls.my_p != null ? parseFloat(ls.my_p) : null;
        const realCurrEdge = (latestMyP != null && livePrice > 0) ? (latestMyP - livePrice) : null;
        currEdge = realCurrEdge != null ? fmtEdge(realCurrEdge) : (ls.edge != null ? fmtEdge(parseFloat(ls.edge)) : '\u2014');

        // Determine change direction based on edge
        const currEdgeVal = realCurrEdge != null ? realCurrEdge : (ls.edge != null ? parseFloat(ls.edge) : null);
        if (t.edge != null && currEdgeVal != null) {
          const origE = Math.abs(parseFloat(t.edge));
          const currE = Math.abs(currEdgeVal);
          if (currE > origE * 1.05) {
            changeIcon = '<span class="forecast-change-up">\u25B2</span>';
          } else if (currE < origE * 0.95) {
            changeIcon = '<span class="forecast-change-down">\u25BC</span>';
          } else {

      const shares = parseFloat(t.total_shares || 0);
      const cost = parseFloat(t.total_cost_usd || 0);
      const entryP = parseFloat(t.entry_price || 0);
      // Max profit = what we'd gain if position resolves at $1 per share
      // Use entry_price to avoid fee-inflated cost making max_profit negative
      const maxProfit = shares > 0 ? shares * (1.0 - entryP) : 0.01;
      const currentValue = shares * (livePrice / 100); // livePrice is in cents
      const unrealizedPnl = currentValue - cost;
      const remaining = Math.max(0, maxProfit - unrealizedPnl);
      const capturedPct = maxProfit > 0 ? Math.max(-100, Math.min(100, unrealizedPnl / maxProfit * 100)) : 0;

      // Visual bar showing how much upside is captured
      const barWidth = Math.max(0, Math.min(100, capturedPct));
      const barColor = capturedPct >= 80 ? 'var(--green)' : capturedPct >= 50 ? 'var(--amber)' : capturedPct > 0 ? 'var(--cyan)' : 'var(--red)';

      html += `<tr>
        <td><span class="badge ${rec.cls}">${rec.label}</span></td>
        <td style="font-family:var(--sans);font-weight:500;">${t.city || '\u2014'}</td>
        <td>${t.date || '\u2014'}</td>
        <td>${band(t) || '\u2014'}</td>
        <td style="color:${comp && comp.forecast_gap != null ? (comp.forecast_gap >= 3 ? 'var(--green)' : comp.forecast_gap >= 1 ? 'var(--amber)' : 'var(--red)') : 'var(--text2)'};">${comp && comp.forecast_gap != null ? fmt(comp.forecast_gap, 1) + '\u00B0C' : '\u2014'}</td>
        <td>${(t.side || '').toUpperCase()}</td>
        <td style="font-size:11px;color:var(--text2);">${t.bet_type || '\u2014'}</td>
        <td>${fmtUsd(cost)}</td>
        <td>${fmt(entryPrice, 1)}\u00A2</td>
        <td>${fmt(livePrice, 1)}\u00A2</td>
        <td class="${pnlPct >= 0 ? 'val-pos' : 'val-neg'}">${pnlPct >= 0 ? '+' : ''}${fmtPct(pnlPct)}</td>
        <td class="${unrealizedPnl >= 0 ? 'val-pos' : 'val-neg'}">${unrealizedPnl >= 0 ? '+' : '-'}$${fmt(Math.abs(unrealizedPnl), 2)}</td>
        <td>$${fmt(Math.max(0, remaining), 2)}</td>
        <td>
          <div style="display:flex;align-items:center;gap:6px;">
            <div style="width:50px;height:6px;background:var(--card-border);border-radius:3px;overflow:hidden;">
              <div style="width:${barWidth}%;height:100%;background:${barColor};border-radius:3px;"></div>

          </div>
        </td>
        <td>${origForecast}</td>
        <td>${latestForecast}</td>
        <td>${origEdge}</td>
        <td>${currEdge}</td>
        <td style="text-align:center;">${changeIcon}</td>
        <td>${hoursLeft < 1 ? '<1h' : fmt(hoursLeft, 0) + 'h'}</td>
        <td style="white-space:nowrap;">
          ${(() => {
            const polyUrl = t.url || (t.event_slug ? 'https://polymarket.com/event/' + t.event_slug : '') || (t.market_slug ? 'https://polymarket.com/event/' + t.market_slug : '');
            return polyUrl ? '<a href="' + polyUrl + '" target="_blank" style="color:var(--cyan);font-size:11px;text-decoration:none;" onclick="event.stopPropagation();">View \u2192</a>' : '\u2014';
          })()}
        </td>
      </tr>`;
    }
  }

  html += `</tbody></table></div></div>`;

  // ── Available Opportunities ──
  html += `<div class="section">
    <div class="section-title"><span class="icon">&#x1F50E;</span> Available Opportunities</div>
    <p style="font-size:12px;color:var(--text2);margin-bottom:12px;">Top opportunities that could be taken if capital were freed up.</p>`;

  if (lastOpportunities.length === 0) {
    html += `<div style="text-align:center;padding:30px;color:var(--text2);font-size:13px;">No additional opportunities found</div>`;
  } else {
    for (let oi = 0; oi < lastOpportunities.length; oi++) {
      const opp = lastOpportunities[oi];
      const edge = parseFloat(opp.edge || 0);
      const oppId = 'opp-detail-' + oi;
      const polyUrl = opp.url || (opp.event_slug ? 'https://polymarket.com/event/' + opp.event_slug : '');
      const isDup = opp._isDuplicate;
      html += `<div class="opp-card" style="flex-wrap:wrap;cursor:pointer;${isDup ? 'opacity:0.5;' : ''}" onclick="var d=document.getElementById('${oppId}');d.style.display=d.style.display==='none'?'block':'none';">
        <div class="opp-info">
          <div class="opp-title">${opp.city || '\u2014'} &mdash; ${opp.date || '\u2014'}${isDup ? ' <span style="font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(255,193,7,0.15);color:#ffc107;font-weight:600;margin-left:6px;">ALREADY HELD</span>' : ''}</div>
          <div class="opp-detail">${(opp.side || '').toUpperCase()} ${band(opp) || ''} | ${opp.bet_type || ''} | Mkt: ${fmt(parseFloat(opp.mkt_p || 0), 1)}\u00A2</div>
        </div>
        <div class="opp-edge ${edge >= 0 ? 'val-pos' : 'val-neg'}">${edge >= 0 ? '+' : ''}${fmtEdge(edge)} edge</div>
        <div id="${oppId}" style="display:none;width:100%;padding-top:10px;border-top:1px solid var(--card-border);margin-top:8px;font-size:12px;font-family:var(--mono);color:var(--text2);">
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:6px 16px;">
            <div>Forecast: <span style="color:var(--text);">${opp.forecast_c != null ? fmt(opp.forecast_c, 1) + '\u00B0C' : '\u2014'}</span></div>
            <div>My P: <span style="color:var(--text);">${opp.my_p != null ? fmt(parseFloat(opp.my_p), 1) + '%' : '\u2014'}</span></div>
            <div>Confidence: <span style="color:var(--text);">${opp.confidence != null ? fmt(parseFloat(opp.confidence) * 100, 0) + '%' : '\u2014'}</span></div>
            <div>EV/Dollar: <span style="color:var(--text);">${opp.ev_per_dollar != null ? fmt(opp.ev_per_dollar, 3) : '\u2014'}</span></div>
          </div>
          ${polyUrl ? `<div style="margin-top:8px;"><a href="${polyUrl}" target="_blank" onclick="event.stopPropagation();" style="color:var(--cyan);text-decoration:none;font-family:var(--sans);font-size:12px;font-weight:500;">Polymarket \u2192</a></div>` : ''}
        </div>
      </div>`;
    }
  }

  html += `</div>`;

  // ── Paper Exit History ──
  html += renderExitHistory();

  $('#app').innerHTML = html;
}

// ── History Sort ──
function onHistorySort(col) {
  if (historySortCol === col) {
    historySortAsc = !historySortAsc;
  } else {
    historySortCol = col;
    historySortAsc = true;
  }
  render(positionsData, lastOpportunities);
}

function histSortArrow(col) {
  if (historySortCol !== col) return '';
  return `<span class="sort-arrow">${historySortAsc ? '\u25B2' : '\u25BC'}</span>`;
}

function sortHistorySnapshots(snaps, col, asc) {
  const sorters = {
    city: (a, b) => (a.city || '').localeCompare(b.city || ''),
    date: (a, b) => (a.date || a.trade_date || '').localeCompare(b.date || b.trade_date || ''),
    band: (a, b) => (a.band_c || a.band || '').localeCompare(b.band_c || b.band || ''),
    rec: (a, b) => (a.recommendation || '').localeCompare(b.recommendation || ''),
    captured: (a, b) => parseFloat(a.captured_pct || 0) - parseFloat(b.captured_pct || 0),
    hours: (a, b) => parseFloat(a.hours_to_resolution || 999) - parseFloat(b.hours_to_resolution || 999),
    capital: (a, b) => parseFloat(a.capital_locked || a.total_cost || 0) - parseFloat(b.capital_locked || b.total_cost || 0),
    hypo_profit: (a, b) => parseFloat(a.hypothetical_profit || 0) - parseFloat(b.hypothetical_profit || 0),
    actual_profit: (a, b) => parseFloat(a.actual_profit || 0) - parseFloat(b.actual_profit || 0),
    exit_vs_hold: (a, b) => parseFloat(a.exit_vs_hold || 0) - parseFloat(b.exit_vs_hold || 0),
  };
  const fn = sorters[col];
  if (!fn) return snaps;
  const sorted = [...snaps].sort(fn);
  return asc ? sorted : sorted.reverse();
}

function recBadge(rec) {
  const map = {
    take_profit: { label: 'Take Profit', cls: 'badge-take-profit' },
    consider_exit: { label: 'Consider Exit', cls: 'badge-consider' },
    danger: { label: 'Danger', cls: 'badge-danger' },
    exit_forecast_changed: { label: 'Exit \u2014 Thesis Broken', cls: 'badge-exit' },
    stop_loss: { label: 'Stop Loss', cls: 'badge-stop' },
  };
  const m = map[rec] || { label: rec || 'Unknown', cls: 'badge-consider' };
  return `<span class="badge ${m.cls}">${m.label}</span>`;
}

function renderExitHistory() {
  let h = '';

  h += `<div class="section" style="margin-top:32px;">
    <div class="section-title"><span class="icon">&#x1F4CB;</span> Paper Exit History</div>`;

  // Info box
  h += `<div class="info-box">
    <strong>How this works:</strong> Each time a non-Hold recommendation is made, a snapshot records the exit price, captured upside, and hours until resolution.
    When the trade resolves, we compare exit profit vs hold profit. <strong>Capital-hours freed</strong> = capital x hours saved &mdash; the opportunity cost of staying in the trade.
    <strong>Positive exit_vs_hold</strong> = exiting would have been better. <strong>Negative</strong> = holding was better.
  </div>`;

  // Check if we have any data
  const summaryData = (historySummary && historySummary.by_recommendation) ? historySummary.by_recommendation : [];
  const hasData = summaryData.length > 0 || historySnapshots.length > 0;

  if (!hasData) {
    h += `<div style="text-align:center;padding:40px;color:var(--text2);font-size:13px;background:var(--card);border:1px solid var(--card-border);border-radius:10px;">
      No exit snapshots recorded yet. Data collection starts automatically \u2014 check back after some trades resolve.
    </div>`;
    h += `</div>`;
    return h;
  }

  // ── Summary Cards ──
  if (summaryData.length > 0) {
    h += `<div class="history-summary-grid">`;
    for (const s of summaryData) {
      const avgEvh = s.avg_exit_vs_hold || 0;
      const evhColor = avgEvh > 0 ? 'var(--green)' : avgEvh < 0 ? 'var(--red)' : 'var(--text2)';
      const winPct = s.exit_better_pct || 0;
      const winColor = winPct >= 50 ? 'var(--green)' : 'var(--red)';

      const avgHours = s.avg_hours_to_resolution;
      const capitalHours = s.total_capital_hours_freed || 0;
      const totalCapital = s.total_capital_locked || 0;

      h += `<div class="history-card">
        <div class="hc-title">${recBadge(s.recommendation)}</div>
        <div class="hc-row"><span class="hc-label">Total snapshots</span><span class="hc-val">${s.total}</span></div>
        <div class="hc-row"><span class="hc-label">Resolved</span><span class="hc-val">${s.resolved}</span></div>
        <div class="hc-row"><span class="hc-label">Avg exit vs hold</span><span class="hc-val" style="color:${evhColor};">${avgEvh >= 0 ? '+' : ''}$${fmt(avgEvh, 4)}</span></div>
        ${avgHours != null ? `<div class="hc-row"><span class="hc-label">Avg hours saved</span><span class="hc-val">${fmt(avgHours, 1)}h</span></div>` : ''}
        ${totalCapital > 0 ? `<div class="hc-row"><span class="hc-label">Capital freed</span><span class="hc-val">$${fmt(totalCapital, 2)}</span></div>` : ''}
        ${capitalHours > 0 ? `<div class="hc-row"><span class="hc-label">Capital-hours freed</span><span class="hc-val" style="color:var(--green);">${fmt(capitalHours, 0)} $\u00B7h</span></div>` : ''}
        ${s.resolved > 0 ? `<div class="hc-winrate" style="color:${winColor};">Exit wins ${fmtPct(winPct)} of the time</div>` : `<div class="hc-winrate" style="color:var(--text2);">No resolved data yet</div>`}
      </div>`;
    }
    h += `</div>`;
  }

  // ── History Table ──
  if (historySnapshots.length > 0) {
    const sorted = historySortCol ? sortHistorySnapshots(historySnapshots, historySortCol, historySortAsc) : historySnapshots;

    h += `<div class="table-card">
      <div class="table-header"><h3>Exit Snapshots (${sorted.length})</h3></div>
      <div class="table-wrap">
      <table>
        <thead><tr>
          <th class="hist-th" onclick="onHistorySort('city')">City${histSortArrow('city')}</th>
          <th class="hist-th" onclick="onHistorySort('date')">Date${histSortArrow('date')}</th>
          <th class="hist-th" onclick="onHistorySort('band')">Band${histSortArrow('band')}</th>
          <th class="hist-th" onclick="onHistorySort('rec')">Rec${histSortArrow('rec')}</th>
          <th class="hist-th" onclick="onHistorySort('captured')">Captured${histSortArrow('captured')}</th>
          <th class="hist-th" onclick="onHistorySort('hours')">Hours Left${histSortArrow('hours')}</th>
          <th class="hist-th" onclick="onHistorySort('capital')">Capital${histSortArrow('capital')}</th>
          <th class="hist-th" onclick="onHistorySort('hypo_profit')">If Exited${histSortArrow('hypo_profit')}</th>
          <th class="hist-th" onclick="onHistorySort('actual_profit')">Actual${histSortArrow('actual_profit')}</th>
          <th class="hist-th" onclick="onHistorySort('exit_vs_hold')">Exit vs Hold${histSortArrow('exit_vs_hold')}</th>
        </tr></thead>
        <tbody>`;

    for (const snap of sorted) {
      const hp = parseFloat(snap.hypothetical_profit || 0);
      const ap = parseFloat(snap.actual_profit || 0);
      const evh = parseFloat(snap.exit_vs_hold || 0);
      const resolved = snap.actual_outcome != null;
      const hours = snap.hours_to_resolution;
      const capital = parseFloat(snap.capital_locked || snap.total_cost || 0);
      const capturedPct = parseFloat(snap.captured_pct || 0);

      h += `<tr>
        <td style="font-family:var(--sans);font-weight:500;">${snap.city || '\u2014'}</td>
        <td>${snap.date || snap.trade_date || '\u2014'}</td>
        <td>${band(snap) || '\u2014'}</td>
        <td>${recBadge(snap.recommendation)}</td>
        <td>${fmt(capturedPct, 1)}%</td>
        <td>${hours != null ? fmt(hours, 1) + 'h' : '\u2014'}</td>
        <td>$${fmt(capital, 2)}</td>
        <td class="${hp >= 0 ? 'val-pos' : 'val-neg'}">${hp >= 0 ? '+' : ''}${fmtUsd(hp)}</td>
        <td>${resolved ? `<span class="${ap >= 0 ? 'val-pos' : 'val-neg'}">${ap >= 0 ? '+' : ''}${fmtUsd(ap)}</span>` : '<span style="color:var(--text2);font-size:11px;">Pending</span>'}</td>
        <td>${resolved ? `<span style="font-weight:600;color:${evh > 0 ? 'var(--green)' : evh < 0 ? 'var(--red)' : 'var(--text2)'};">${evh > 0 ? '+' : ''}${fmtUsd(evh)}</span>` : '<span style="color:var(--text2);font-size:11px;">Pending</span>'}</td>
      </tr>`;
    }

    h += `</tbody></table></div></div>`;
  }

  h += `</div>`;
  return h;
}

// ── Init ──
loadPortfolios();
</script>
</body>
</html>
