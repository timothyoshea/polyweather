<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolyWeather — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --card-border: #1e1e2e;
    --text: #e0e0e0;
    --text2: #888;
    --cyan: #4fc3f7;
    --green: #00e676;
    --amber: #ffc107;
    --red: #ff5252;
    --sans: 'Inter', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .login-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 40px 36px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .logo {
    font-size: 28px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 6px;
  }
  .logo span { color: var(--cyan); }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 32px;
  }
  label {
    display: block;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 6px;
    font-family: var(--mono);
  }
  input[type="email"], input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 16px;
  }
  input:focus { border-color: var(--cyan); }
  .code-input {
    font-size: 28px !important;
    letter-spacing: 10px;
    text-align: center;
    font-weight: 600;
    padding: 14px !important;
  }
  .btn {
    display: block;
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: var(--sans);
    transition: opacity 0.15s;
    background: var(--cyan);
    color: #0a0a0f;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .msg {
    font-size: 12px;
    text-align: center;
    margin-top: 14px;
    font-family: var(--mono);
    min-height: 18px;
  }
  .msg.error { color: var(--red); }
  .msg.success { color: var(--green); }
  .back-link {
    text-align: center;
    margin-top: 16px;
  }
  .back-link a {
    color: var(--text2);
    font-size: 12px;
    text-decoration: none;
    cursor: pointer;
  }
  .back-link a:hover { color: var(--cyan); }
  .hidden { display: none !important; }
  .sent-info {
    text-align: center;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .sent-info strong { color: var(--text); }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">Poly<span>Weather</span></div>
  <div class="subtitle">Sign in with a one-time code</div>

  <!-- Step 1: Email -->
  <div id="step-email">
    <label>Email address</label>
    <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email" autofocus>
    <button class="btn" id="send-btn" onclick="sendCode()">Send Login Code</button>
    <div class="msg" id="email-msg"></div>
  </div>

  <!-- Step 2: Code (hidden initially) -->
  <div id="step-code" class="hidden">
    <div class="sent-info">
      We sent a 6-digit code to<br><strong id="sent-to-email"></strong>
    </div>
    <label>Enter code</label>
    <input type="text" id="code-input" class="code-input" placeholder="------" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
    <label style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);cursor:pointer;margin-top:12px;margin-bottom:12px;">
      <input type="checkbox" id="remember-me" checked style="accent-color:var(--cyan);width:16px;height:16px;cursor:pointer;">
      Remember this computer for 30 days
    </label>
    <button class="btn" id="verify-btn" onclick="verifyCode()">Sign In</button>
    <div class="msg" id="code-msg"></div>
    <div class="back-link"><a onclick="showEmailStep()">Use a different email</a></div>
  </div>
</div>

<script>
  // Check if already logged in — redirect to home
  (async function() {
    try {
      const r = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'check' }),
      });
      const d = await r.json();
      if (d.authenticated) window.location.href = '/';
    } catch(e) { /* not logged in, show form */ }
  })();

  let userEmail = '';

  function showEmailStep() {
    document.getElementById('step-email').classList.remove('hidden');
    document.getElementById('step-code').classList.add('hidden');
    document.getElementById('email-msg').textContent = '';
  }

  async function sendCode() {
    const btn = document.getElementById('send-btn');
    const msg = document.getElementById('email-msg');
    const email = document.getElementById('email-input').value.trim().toLowerCase();

    if (!email || !email.includes('@')) {
      msg.className = 'msg error';
      msg.textContent = 'Enter a valid email address';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Sending...';
    msg.textContent = '';
    msg.className = 'msg';

    try {
      const resp = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'send-code', email }),
      });
      const data = await resp.json();

      if (resp.ok && data.sent) {
        userEmail = email;
        document.getElementById('sent-to-email').textContent = email;
        document.getElementById('step-email').classList.add('hidden');
        document.getElementById('step-code').classList.remove('hidden');
        document.getElementById('code-input').value = '';
        document.getElementById('code-input').focus();
      } else {
        msg.className = 'msg error';
        msg.textContent = data.error || 'Failed to send code';
      }
    } catch (e) {
      msg.className = 'msg error';
      msg.textContent = 'Network error. Try again.';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Send Login Code';
    }
  }

  async function verifyCode() {
    const btn = document.getElementById('verify-btn');
    const msg = document.getElementById('code-msg');
    const code = document.getElementById('code-input').value.trim();

    if (!code || code.length < 6) {
      msg.className = 'msg error';
      msg.textContent = 'Enter the 6-digit code';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Verifying...';
    msg.textContent = '';
    msg.className = 'msg';

    try {
      const resp = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'verify', email: userEmail, code }),
      });
      const data = await resp.json();

      if (resp.ok && data.authenticated) {
        msg.className = 'msg success';
        msg.textContent = 'Signed in! Redirecting...';
        setTimeout(() => { window.location.href = '/'; }, 500);
      } else {
        msg.className = 'msg error';
        msg.textContent = data.error || 'Invalid code';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    } catch (e) {
      msg.className = 'msg error';
      msg.textContent = 'Network error. Try again.';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  // Submit on Enter
  document.getElementById('email-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') sendCode();
  });
  document.getElementById('code-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') verifyCode();
  });
</script>
</body>
</html>
